cat nginx.conf 
events {
    worker_connections 15000; # Increased for better performance
}

http { # <--- Everything below this line should be inside this http block

    upstream discovery-service {
        server 127.0.0.1:9000;
    }

    upstream user-service {
        server 127.0.0.1:9001; # Verify this port if it's shared with others
    }
    upstream device-service {
        server 127.0.0.1:9001; # Assuming different port, ADJUST IF NEEDED
    }

    upstream bill-service {
        server 127.0.0.1:9001; # Assuming different port, ADJUST IF NEEDED
    }

    upstream digital-signage{
        server 192.168.0.119:9000
    }
    
    # Optional: Rate limiting definition (uncomment and adjust if needed   # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s; 

    server {
        listen 80; # Changed to standard HTTP port 80 for public access
        server_name smcwaterbill.com  www.smcwaterbill.com;
        return 301 https://$server_name$request_uri; # Redirect HTTP to HTTPS
    }

    server {
        listen 443 ssl; # Changed to standard HTTPS port 443
        server_name smcwaterbill.com  www.smcwaterbill.com;

        ssl_certificate /etc/nginx/ssl/smcwaterbill.com-certificate.crt;
        ssl_certificate_key /etc/nginx/ssl/smcwaterbill.key;

        ssl_protocols TLSv1.2 TLSv1.3; # Modern protocols for better security
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_prefer_server_ciphers on;

        # Optional: HSTS header for enhanced security
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        location / {
            #limit_req zone=api_limit burst=20 nodelay; # Apply if rate limit zone is defined
            root /var/www/frontend;
            index index.html index.htm;
            include /etc/nginx/mime.types;
            try_files $uri $uri/ /index.html; # Changed =404 to /index.html for SPA refresh
        }

        location /eureka {
            #limit_req zone=api_limit burst=20 nodelay; # Apply if rate limit zone is defined
            proxy_pass http://discovery-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /users {
            #limit_req zone=api_limit burst=20 nodelay; # Apply if rate limit zone is defined
            proxy_pass http://user-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /digitalsignage {
            #limit_req zone=api_limit burst=20 nodelay; # Apply if rate limit zone is defined
            proxy_pass http://digital-signage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /devices {
            #limit_req zone=api_limit burst=20 nodelay; # Apply if rate limit zone is defined
            proxy_pass http://device-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /bills {
            #limit_req zone=api_limit burst=20 nodelay; # Apply if rate limit zone is defined
            proxy_pass http://bill-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    } # End of the main server block for HTTPS
} # <--- End of the http block
